name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # permite disparar manualmente na aba Actions do GitHub

jobs:
  build:
    name: Build APK (Capacitor Remote App)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout do repositório ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 (requerido pelo Android Gradle) ───────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Node.js 22 (Capacitor CLI exige >= 22) ────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      # ── 4. Instalar dependências npm (inclui @capacitor/*) ───────────────────
      - name: Install dependencies
        run: npm install

      # ── 5. Aceitar licenças do Android SDK (evita travamento do Gradle) ──────
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # ── 6. Capacitor sync: copia config para o projeto Android ───────────────
      #    Não precisa de "next build" pois o app usa URL remota (Vercel)
      - name: Capacitor sync
        run: npx cap sync android

      # ── 7. Cache do Gradle para builds mais rápidas ──────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 8. Permissão de execução para o Gradle Wrapper ───────────────────────
      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      # ── 9. Build do APK de debug ─────────────────────────────────────────────
      - name: Build APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 10. Upload do APK como artefato da Action ────────────────────────────
      #     Disponível para download em: Actions → run → Artifacts
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hogwarts-showdown-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 11. Criar GitHub Release automática em cada push ─────────────────────
      #     O APK ficará em: Releases → hogwarts-showdown-vX.apk
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Hogwarts Showdown APK #${{ github.run_number }}"
          body: |
            📲 **Aplicativo Android — Build automática**

            Instale o `.apk` no seu Android para jogar sem interferência do browser.
            O app abre o site Vercel em tempo real — sempre atualizado!

            **Como instalar:**
            1. Baixe o arquivo `hogwarts-showdown.apk`
            2. No celular: Configurações → Segurança → Permitir fontes desconhecidas
            3. Abra o arquivo e instale
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
