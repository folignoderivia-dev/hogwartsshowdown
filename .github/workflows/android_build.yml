name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build APK (Capacitor Remote App)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Node.js 24 (Capacitor CLI exige >= 22) ────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      # ── 4. Instalar dependências ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 5. Aceitar licenças Android SDK ──────────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # ── 6. Capacitor sync ────────────────────────────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android

      # ── 7. Capacitor copy (garante assets atualizados) ───────────────────────
      - name: Capacitor copy
        run: npx cap copy android

      # ── 8. Cache Gradle ───────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 9. Permissão gradlew ──────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      # ── 10. Build APK debug ───────────────────────────────────────────────────
      - name: Build APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 11. Upload artefato ───────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hogwarts-showdown-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 12. Criar GitHub Release ──────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Hogwarts Showdown APK #${{ github.run_number }}"
          body: |
            📲 **Aplicativo Android — Build automática**

            Instale o `.apk` no seu Android para jogar sem interferência do browser.
            O app abre o site Vercel em tempo real — sempre atualizado!

            **Como instalar:**
            1. Baixe o arquivo `app-debug.apk`
            2. No celular: Configurações → Segurança → Permitir fontes desconhecidas
            3. Abra o arquivo e instale
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
