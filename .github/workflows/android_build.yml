name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build APK (Capacitor Remote App)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necessário para criar GitHub Releases

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 21 (Capacitor 6+ exige source release 21) ───────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # ── 3. Node.js 22 via nvm + GITHUB_PATH ──────────────────────────────────
      - name: Install Node.js 22
        shell: bash
        run: |
          export NVM_DIR="${HOME}/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
          nvm install 22
          nvm use 22
          nvm alias default 22
          NODE_BIN=$(nvm which 22 | xargs dirname)
          echo "$NODE_BIN" >> $GITHUB_PATH

      # ── 4. Verificar Node ─────────────────────────────────────────────────────
      - name: Verify Node version
        run: |
          node --version
          npm --version

      # ── 5. Instalar dependências ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 6. Diagnóstico do Android SDK ─────────────────────────────────────────
      - name: Android SDK info
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_SDK_ROOT/cmdline-tools/" 2>/dev/null || echo "cmdline-tools nao encontrado"
          ls "$ANDROID_SDK_ROOT/build-tools/"   2>/dev/null || echo "build-tools nao encontrado"

      # ── 7. Aceitar licenças Android SDK ──────────────────────────────────────
      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || \
          yes | sdkmanager --licenses 2>/dev/null || \
          echo "sdkmanager nao disponivel, continuando..."

      # ── 8. Instalar build-tools necessários ───────────────────────────────────
      - name: Install Android build-tools
        run: |
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" 2>/dev/null || \
          sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" 2>/dev/null || \
          echo "sdkmanager nao disponivel, assumindo SDK preinstalado..."

      # ── 9. Garantir que webDir exista (Capacitor exige mesmo em modo remoto) ──
      - name: Ensure webDir exists
        run: |
          mkdir -p public
          [ -f public/index.html ] || echo '<!DOCTYPE html><html><body></body></html>' > public/index.html

      # ── 10. Capacitor sync ───────────────────────────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android

      # ── 10. Capacitor copy ────────────────────────────────────────────────────
      - name: Capacitor copy
        run: npx cap copy android

      # ── 11. Cache Gradle ──────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 12. Permissão gradlew ─────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      # ── 13. Build APK debug (com stacktrace para erros detalhados) ────────────
      - name: Build APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 14. Upload artefato ───────────────────────────────────────────────────
      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hogwarts-showdown-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 15. Criar GitHub Release ──────────────────────────────────────────────
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Hogwarts Showdown APK #${{ github.run_number }}"
          body: |
            📲 **Aplicativo Android — Build automática**

            Instale o `.apk` no seu Android para jogar sem interferência do browser.
            O app abre o site Vercel em tempo real — sempre atualizado!

            **Como instalar:**
            1. Baixe o arquivo `app-debug.apk`
            2. No celular: Configurações → Segurança → Permitir fontes desconhecidas
            3. Abra o arquivo e instale
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
