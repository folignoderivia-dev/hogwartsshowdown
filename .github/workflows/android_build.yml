name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build APK (Capacitor Remote App)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Node.js 22 via nvm + GITHUB_PATH (persiste em todos os steps) ─────
      #    ubuntu-latest já vem com nvm pré-instalado.
      #    Adicionar o binário ao GITHUB_PATH garante que TODOS os steps
      #    seguintes usem Node 22, independente do runner padrão.
      - name: Install and activate Node.js 22
        shell: bash
        run: |
          export NVM_DIR="${HOME}/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
          nvm install 22
          nvm use 22
          nvm alias default 22
          NODE_BIN=$(nvm which 22 | xargs dirname)
          echo "$NODE_BIN" >> $GITHUB_PATH
          echo "Node path added: $NODE_BIN"

      # ── 4. Verificar versão ativas ────────────────────────────────────────────
      - name: Verify Node version
        run: |
          node --version
          npm --version

      # ── 5. Instalar dependências npm ──────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 6. Aceitar licenças Android SDK ──────────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # ── 7. Capacitor sync ────────────────────────────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android

      # ── 8. Capacitor copy ─────────────────────────────────────────────────────
      - name: Capacitor copy
        run: npx cap copy android

      # ── 9. Cache Gradle ───────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 10. Permissão gradlew ─────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      # ── 11. Build APK debug ───────────────────────────────────────────────────
      - name: Build APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 12. Upload artefato ───────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hogwarts-showdown-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 13. Criar GitHub Release ──────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Hogwarts Showdown APK #${{ github.run_number }}"
          body: |
            📲 **Aplicativo Android — Build automática**

            Instale o `.apk` no seu Android para jogar sem interferência do browser.
            O app abre o site Vercel em tempo real — sempre atualizado!

            **Como instalar:**
            1. Baixe o arquivo `app-debug.apk`
            2. No celular: Configurações → Segurança → Permitir fontes desconhecidas
            3. Abra o arquivo e instale
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
